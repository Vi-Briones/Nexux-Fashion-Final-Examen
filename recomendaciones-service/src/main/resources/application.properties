spring.application.name=recomendaciones-service
server.port=9100

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_recomendacion?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.file.name=logs/recomendaciones-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

api.base-url=http://api-gateway:9090
api.cliente.exists=/clientes/%d/exists
api.producto.exists=/productos/%d/exists

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
