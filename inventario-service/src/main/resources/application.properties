spring.application.name=inventario-service
server.port=9096
api.base-url=http://api-gateway:9090

# 1. CORRECCIÓN DE URL: Cambiamos host.docker.internal por localhost
spring.datasource.url=jdbc:mysql://localhost:3306/bd_inventario?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# 2. DESACTIVAR LIQUIBASE TEMPORALMENTE
spring.liquibase.enabled=false

# 3. ESTRATEGIA DE TABLAS HIBERNATE
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true

# 4. CONFIGURACIÓN DE LOGS
logging.file.name=logs/inventario-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

# CONFIGURACIÓN DE SWAGGER 
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html