spring.application.name=venta-service
server.port=9094

spring.datasource.url=jdbc:mysql://localhost:3306/bd_venta?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

logging.file.name=logs/venta-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n
