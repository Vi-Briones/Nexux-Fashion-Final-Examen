spring.application.name=soporte-service
server.port=9099

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_soporte?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.file.name=logs/soporte-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

api.base-url=http://localhost:9090
api.cliente.exists=/clientes/%d/exists