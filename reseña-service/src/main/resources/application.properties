spring.application.name=resena-service
server.port=9097

# URLs de comunicación con el API-Gateway
api.base-url=http://api-gateway:9090
api.compra.exists=http://localhost:9090/compras/%s/exists

# Configuración de Base de Datos para Docker/Local
spring.datasource.url=jdbc:mysql://localhost:3306/bd_resena?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Configuración JPA / Hibernate igual al ejemplo
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true

# Rutas y patrones de Logs
logging.file.name=logs/resena-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

# Documentación con Swagger/OpenAPI personalizados para reseñas
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
