spring.application.name=resena-service
server.port=9097

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_resena?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

api.base-url=http://api-gateway:9090
api.compra.exists=/compras/%s/exists

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.file.name=logs/resena-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html