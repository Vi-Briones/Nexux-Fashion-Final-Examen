spring.application.name=producto-service
server.port=9093

spring.datasource.url=jdbc:mysql://localhost:3306/bd_producto?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Activación de Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql
spring.liquibase.enabled=true
spring.jpa.hibernate.ddl-auto=none

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

logging.file.name=logs/producto-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n
